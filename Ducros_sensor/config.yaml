# Ducros センサー 設定ファイル
# このファイルは ducros_sensor.py と同じディレクトリに置く。
# 実行は  python ducros_sensor.py  だけで OK。

# ----- 入力 -----
# 読み込む .vtu ファイル。
#   null (または空) にすると、スクリプトと同じディレクトリの .vtu を自動で探す。
#   ファイル名を直接書いてもよい (例: "flow.vtu")。
input_file: null

# 同じディレクトリに .vtu が複数あった場合の挙動:
#   first : 最初に見つかった 1 つだけ処理
#   all   : 見つかった全ての .vtu を順に処理
multiple_files: first

# ----- センサーのパラメータ -----
# Ducros セレクタ phi = div^2 / (div^2 + omega^2 + eps) のしきい値 (0〜1)。
# 「圧縮が渦より優勢」と判定する基準。
threshold: 0.95

# マッハ数ゲート: 衝撃波は超音速流中にしか存在できない。
# よどみ点 (M≈0) など亜音速の強圧縮領域の誤検知を除去する。
# SU2 出力に Mach フィールドがあれば自動的に適用される。
# 0 にするとゲート無効。
mach_threshold: 0.8

# eps(分母の床)の相対値。
#   eps = (eps_rel * 基準圧縮)^2 として与える。
#   滑らかな一様流での誤検知を抑える要。
#   誤検知が多い → 大きく(例 1e-2)、検出が鈍い → 小さく(例 1e-4)。
eps_rel: 1.0e-3

# 振幅ゲート: 圧縮強度 -div u が (magnitude_rel * 基準圧縮) を超える節点だけを
# 衝撃波とみなす。滑らかな領域の誤検知を除く決定的な要素。
#   0 にするとゲート無効(セレクタのみ)。
#   誤検知が多い → 大きく(例 0.2〜0.3)。
magnitude_rel: 0.1

# 基準圧縮スケールを取るパーセンタイル(外れ値に強くするため高めに)。
ref_percentile: 99.0

# ----- 出力 -----
# 出力ファイル名。
#   null にすると入力名から自動生成 (例: flow.vtu -> flow_ducros.vtu)
output_file: null
